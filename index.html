<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipariş Uygulaması</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1D9E75">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f4;
      --bg3: #efefed;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9e9e99;
      --border: rgba(0, 0, 0, 0.10);
      --border2: rgba(0, 0, 0, 0.22);
      --green: #1D9E75;
      --green2: #E1F5EE;
      --green3: #085041;
      --rmd: 8px;
      --rlg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #262624;
        --bg3: #2e2e2b;
        --text: #f0efe8;
        --text2: #a0a09a;
        --text3: #6a6a65;
        --border: rgba(255, 255, 255, 0.10);
        --border2: rgba(255, 255, 255, 0.22);
        --green2: #04342C;
        --green3: #9FE1CB;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border2);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      margin-right: auto;
    }

    .logo span {
      color: var(--green);
    }

    .nav-btn {
      height: 52px;
      padding: 0 16px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: color 0.15s;
    }

    .nav-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
      font-weight: 500;
    }

    .nav-btn i {
      font-size: 16px;
    }

    /* ── VIEWS ── */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ── CONTAINER ── */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* ── KATEGORİ FİLTRE ── */
    .cats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .cat-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }

    .cat-btn:hover {
      background: var(--bg2);
    }

    .cat-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    /* ── ÜRÜN KARTLARI ── */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--rlg);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.12s;
    }

    .card:hover {
      border-color: var(--border2);
    }

    .card.inactive {
      opacity: 0.45;
    }

    .card-media {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 120px;
      overflow: hidden;
      border-radius: 12px;
      background: var(--bg2);
    }

    .card-media img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
    }

    .card-emoji {
      font-size: 30px;
      text-align: center;
      padding: 6px 0;
    }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .card-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .price {
      font-size: 14px;
      font-weight: 500;
      color: var(--green);
    }

    .add-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .add-btn:active {
      transform: scale(0.88);
    }

    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .qty-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 0.5px solid var(--border2);
      background: var(--bg2);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .qty-num {
      font-size: 13px;
      font-weight: 500;
      min-width: 14px;
      text-align: center;
    }

    /* ── SEPET ÇUBUĞU ── */
    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-top: 0.5px solid var(--border2);
      padding: 10px 20px;
      z-index: 40;
    }

    .cart-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cart-info {
      flex: 1;
      font-size: 13px;
      color: var(--text2);
    }

    .cart-info strong {
      color: var(--text);
      font-weight: 500;
    }

    .co-btn {
      padding: 9px 20px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--rmd);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
      white-space: nowrap;
    }

    .co-btn:hover {
      background: #0F6E56;
    }

    .co-btn:disabled {
      opacity: 0.38;
      cursor: default;
      background: var(--green);
    }

    /* ── ADMIN PANEL ── */
    .admin-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 0.5px solid var(--border2);
      margin-bottom: 1.5rem;
      background: var(--bg);
      border-radius: var(--rlg) var(--rlg) 0 0;
      padding: 0 16px;
    }

    .atab {
      padding: 12px 14px;
      font-size: 13px;
      border: none;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }

    .atab.active {
      color: var(--green);
      border-bottom-color: var(--green);
      font-weight: 500;
    }

    .asec {
      display: none;
    }

    .asec.active {
      display: block;
    }

    .panel {
      background: var(--bg);
      border-radius: 0 0 var(--rlg) var(--rlg);
      border: 0.5px solid var(--border2);
      border-top: none;
      padding: 18px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--bg2);
      border-radius: var(--rmd);
      padding: 10px 12px;
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 3px;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 500;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select {
      font-size: 13px;
      padding: 0 10px;
      height: 34px;
      border-radius: var(--rmd);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    .toolbar input {
      flex: 1;
      min-width: 130px;
    }

    .btn {
      height: 34px;
      padding: 0 12px;
      border-radius: var(--rmd);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      font-family: inherit;
      transition: transform 0.1s;
    }

    .btn:hover {
      background: var(--bg2);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-g {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .btn-g:hover {
      background: #0F6E56;
    }

    .btn-r {
      background: #FCEBEB;
      color: #A32D2D;
      border-color: #F09595;
    }

    @media (prefers-color-scheme: dark) {
      .btn-r {
        background: #3a1515;
        color: #F09595;
        border-color: #791F1F;
      }
    }

    .btn-sm {
      height: 28px;
      padding: 0 8px;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      text-align: left;
      padding: 7px 8px;
      border-bottom: 0.5px solid var(--border2);
      white-space: nowrap;
    }

    td {
      font-size: 13px;
      padding: 9px 8px;
      border-bottom: 0.5px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--bg2);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .b-active {
      background: var(--green2);
      color: var(--green3);
    }

    .b-passive {
      background: var(--bg2);
      color: var(--text3);
    }

    .iact {
      display: flex;
      gap: 5px;
    }

    .tbl-wrap {
      overflow-x: auto;
    }

    /* ── OVERLAY / MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg);
      border-radius: var(--rlg);
      border: 0.5px solid var(--border2);
      padding: 1.25rem;
      width: 100%;
      max-width: 400px;
      margin: 16px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .frow {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 11px;
    }

    .frow label {
      font-size: 11px;
      color: var(--text2);
    }

    .frow input,
    .frow select,
    .frow textarea {
      width: 100%;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: var(--rmd);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    .frow textarea {
      resize: vertical;
      min-height: 56px;
    }

    .frow input:focus,
    .frow select:focus,
    .frow textarea:focus {
      box-shadow: 0 0 0 2px rgba(29, 158, 117, 0.28);
      border-color: var(--green);
    }

    .faction {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    /* sipariş sheet */
    .sheet {
      background: var(--bg);
      border-radius: var(--rlg) var(--rlg) 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .sheet h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .oline {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
    }

    .oline:last-of-type {
      border-bottom: none;
    }

    .ototal {
      display: flex;
      justify-content: space-between;
      padding: 10px 0 0;
      font-weight: 500;
      font-size: 14px;
      border-top: 1px solid var(--border2);
      margin-top: 4px;
    }

    .sheet-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .sheet-actions .btn {
      flex: 1;
      height: 40px;
      font-size: 13px;
      justify-content: center;
    }

    .empty-msg {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text3);
      font-size: 13px;
    }

    /* kategori renk badge'leri */
    .cb {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">🛒 İlker<span>Market</span></div>
    <button class="nav-btn" id="nav-track" onclick="switchView('track')">
      <i class="ti ti-search"></i> Sipariş Takip
    </button>
    <button class="nav-btn active" id="nav-order" onclick="switchView('order')">
      <i class="ti ti-shopping-cart"></i> Sipariş Ver
    </button>
    <button class="nav-btn" id="nav-admin" onclick="switchView('admin')">
      <i class="ti ti-settings"></i> Yönetim
    </button>
  </div>

  <!-- ══════════ SİPARİŞ SAYFASI ══════════ -->
  <div class="view active" id="view-order">
    <div class="wrap">
      <div style="margin-bottom:14px">
        <input id="product-search" type="text" placeholder="Ürün ara..." oninput="renderOrderProducts()" style="
      width:100%;
      height:42px;
      border-radius:12px;
      border:0.5px solid var(--border2);
      background:var(--bg2);
      color:var(--text);
      padding:0 14px;
      font-size:14px;
      outline:none;
    ">
      </div>
      <div class="cats" id="order-cats"></div>
      <div class="cats" id="order-subcats"></div>
      <div class="products" id="order-products"></div>
    </div>
    <div class="cart-bar">
      <div class="cart-inner">
        <div class="cart-info">Sepet: <strong id="cart-count">0 ürün</strong> · <strong id="cart-total">₺0</strong>
        </div>
        <button class="co-btn" id="co-btn" disabled onclick="openOrderSheet()">Siparişi Tamamla</button>
      </div>
    </div>
  </div>

  <!-- ══════════ ADMİN PANELİ ══════════ -->
  <div class="view" id="view-admin">
    <div class="wrap" style="padding-bottom:24px">

      <div class="admin-tabs">
        <button class="atab active" onclick="switchAdminTab('dash')">
          <i class="ti ti-dashboard"></i> Dashboard
        </button>

        <button class="atab" onclick="switchAdminTab('prod')">
          <i class="ti ti-package"></i> Ürünler
        </button>

        <button class="atab" onclick="switchAdminTab('cat')">
          <i class="ti ti-tag"></i> Kategoriler
        </button>

        <button class="atab" onclick="switchAdminTab('subcat')">
          <i class="ti ti-category"></i> Alt Gruplar
        </button>

        <button class="atab" onclick="switchAdminTab('orders')">
          <i class="ti ti-receipt"></i> Siparişler
        </button>
      </div>

      <!-- DASHBOARD -->
      <div id="asec-dash" class="asec active">
        <div class="panel">
          <div class="stat-row" id="dashboard-stats"></div>

          <div style="margin-top:16px">
            <h3 style="font-size:15px;margin-bottom:10px">Son Siparişler</h3>

            <div class="tbl-wrap">
              <table>
                <thead>
                  <tr>
                    <th>No</th>
                    <th>Müşteri</th>
                    <th>Toplam</th>
                    <th>Durum</th>
                    <th>Tarih</th>
                  </tr>
                </thead>

                <tbody id="dashboard-orders"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ÜRÜNLER -->
      <div id="asec-prod" class="asec">
        <div class="panel">

          <div class="stat-row" id="a-stats"></div>

          <div class="toolbar">
            <input type="text" id="a-search" placeholder="Ürün ara..." oninput="renderAdminProducts()">

            <select id="a-filter" onchange="renderAdminProducts()">
              <option value="">Tüm kategoriler</option>
            </select>

            <button class="btn btn-g" onclick="openModal('prod','new')">
              <i class="ti ti-plus"></i> Yeni ürün
            </button>

            <button class="btn" onclick="exportData()">
              <i class="ti ti-download"></i> Dışa Aktar
            </button>

            <button class="btn" onclick="document.getElementById('data-import').click()">
              <i class="ti ti-upload"></i> İçe Aktar
            </button>

            <input id="data-import" type="file" accept="application/json" style="display:none"
              onchange="importData(event)">
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:32px"></th>
                  <th>Ürün adı</th>
                  <th style="width:110px">Kategori</th>
                  <th style="width:72px">Fiyat</th>
                  <th style="width:70px">Durum</th>
                  <th style="width:96px"></th>
                </tr>
              </thead>

              <tbody id="a-prod-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- KATEGORİLER -->
      <div id="asec-cat" class="asec">
        <div class="panel">

          <div class="toolbar">
            <button class="btn btn-g" onclick="openModal('cat','new')">
              <i class="ti ti-plus"></i> Yeni kategori
            </button>
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:32px"></th>
                  <th>Kategori adı</th>
                  <th style="width:90px">Ürün sayısı</th>
                  <th style="width:70px">Durum</th>
                  <th style="width:96px"></th>
                </tr>
              </thead>

              <tbody id="a-cat-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ALT GRUPLAR -->
      <div id="asec-subcat" class="asec">
        <div class="panel">

          <div class="toolbar">
            <button class="btn btn-g" onclick="openModal('subcat','new')">
              <i class="ti ti-plus"></i> Yeni alt grup
            </button>
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>Alt grup adı</th>
                  <th style="width:130px">Ana kategori</th>
                  <th style="width:80px">Durum</th>
                  <th style="width:96px"></th>
                </tr>
              </thead>

              <tbody id="a-subcat-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- SİPARİŞLER -->
      <div id="asec-orders" class="asec">
        <div class="panel">

          <div class="toolbar">
            <button class="btn" onclick="renderOrders()">
              <i class="ti ti-refresh"></i> Yenile
            </button>
          </div>

          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:60px">No</th>
                  <th>Müşteri</th>
                  <th>Telefon</th>
                  <th style="width:90px">Toplam</th>
                  <th style="width:130px">Durum</th>
                  <th style="width:140px">Tarih</th>
                  <th style="width:80px"></th>
                </tr>
              </thead>

              <tbody id="a-orders-body"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="view" id="view-track">
    <div class="wrap">
      <div class="panel" style="border:0.5px solid var(--border2);border-radius:var(--rlg);">
        <h3 style="font-size:16px;margin-bottom:14px">Sipariş Takip</h3>

        <div class="frow">
          <label>Sipariş No</label>
          <input id="track-order-id" type="number" placeholder="Örn: 157">
        </div>

        <div class="frow">
          <label>Telefon</label>
          <input id="track-phone" placeholder="05xxxxxxxxx">
        </div>

        <button class="btn btn-g" style="width:100%;justify-content:center;height:40px" onclick="trackOrder()">
          Sorgula
        </button>

        <div id="track-result" style="margin-top:16px"></div>
      </div>
    </div>
  </div>

  <!-- ══════════ OVERLAY ══════════ -->
  <div class="overlay" id="overlay" onclick="overlayBg(event)">
    <div class="modal" id="modal"></div>
  </div>

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'siparis-data.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function importData(event) {

        event.target.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || !Array.isArray(data.products) || !Array.isArray(data.cats)) throw new Error();
          products = data.products.map(p => ({
            id: Number(p.id) || 0,
            name: String(p.name || ''),
            desc: String(p.desc || ''),
            price: Number(p.price) || 0,
            cat: String(p.cat || ''),
            subCat: String(p.subCat || ''),
            emoji: String(p.emoji || '🍽'),
            imageUrl: String(p.imageUrl || ''),
            active: Boolean(p.active)

            name: String(c.name || ''),
            emoji: String(c.emoji || '🍽'),
            active: Boolean(c.active),

          alert('Geçersiz JSON dosyası. Lütfen doğru formatı kullanın.');
        }
        event.target.value = '';
      };
      reader.readAsText(file);

    function renderOrderSubCats() {
      if (!Array.isArray(subcats)) subcats = []

      const el = document.getElementById('order-subcats')
      if (!el) return

      if (orderCat === 'hepsi') {
        el.innerHTML = ''
        return
      }

      const list = subcats.filter(s => s.active && s.catId === orderCat)

      if (!list.length) {
        el.innerHTML = ''
        return
      }

      el.innerHTML =
        `<button class="cat-btn${orderSubCat === 'hepsi' ? ' active' : ''}" onclick="setOrderSubCat('hepsi')">Tümü</button>` +
        list.map(s =>
          `<button class="cat-btn${orderSubCat === s.id ? ' active' : ''}" onclick="setOrderSubCat('${s.id}')">${s.name}</button>`
        ).join('')
    }

    function setOrderCat(id) {
      orderCat = id
      orderSubCat = 'hepsi'

      renderOrderCats()
      renderOrderSubCats()
      renderOrderProducts()
    }

    function setOrderSubCat(id) {
      orderSubCat = id

      renderOrderSubCats()
      renderOrderProducts()
    }

    function renderOrderProducts() {
      if (!Array.isArray(products)) products = []
      if (!Array.isArray(cats)) cats = []

      const activeCatIds = new Set(cats.filter(c => c.active).map(c => c.id))

      let list = products.filter(p => p.active && activeCatIds.has(p.cat))

      const search = (document.getElementById('product-search')?.value || '').toLowerCase().trim()

      if (orderCat !== 'hepsi') {
        list = list.filter(p => p.cat === orderCat)
      }

      if (orderSubCat && orderSubCat !== 'hepsi') {
        list = list.filter(p => (p.subCat || '') === orderSubCat)
      }

      if (search) {
        list = list.filter(p => {
          const sub = subcats.find(s => s.id === p.subCat)

          return (
            (p.name || '').toLowerCase().includes(search) ||
            (p.desc || '').toLowerCase().includes(search) ||
            (sub?.name || '').toLowerCase().includes(search)
          )
        })
      }

      const el = document.getElementById('order-products')

      if (!list.length) {
        el.innerHTML = `<div class="empty-msg" style="grid-column:1/-1">Ürün bulunamadı.</div>`
        return
      }

      el.innerHTML = list.map(p => {
        const qty = cart[p.id] || 0

        const mediaHtml = p.imageUrl
          ? `<div class="card-media"><img src="${p.imageUrl}" alt="${p.name}" loading="lazy"></div>`
          : `<div class="card-media"><div class="card-emoji">${p.emoji || '🍽'}</div></div>`

        return `<div class="card">
      ${mediaHtml}
      <div class="card-name">${p.name}</div>
      <div class="card-desc">${p.desc || ''}</div>
      <div class="card-footer">
        <span class="price">₺${p.price}</span>
        ${qty === 0
            ? `<button class="add-btn" onclick="cartAdd(${p.id})">+</button>`
            : `<div class="qty-ctrl">
              <button class="qty-btn" onclick="cartRemove(${p.id})">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="cartAdd(${p.id})">+</button>
            </div>`
          }
      </div>
    </div>`
      }).join('')
    }

    function cartAdd(id) { cart[id] = (cart[id] || 0) + 1; updateCartBar(); renderOrderProducts(); }
    function cartRemove(id) {
      if (cart[id] > 1) cart[id]--; else delete cart[id];
      updateCartBar(); renderOrderProducts();
    }

    function updateCartBar() {
      Object.keys(cart).forEach(id => {
        if (!products.find(p => p.id == id)) delete cart[id];
      });
      const count = Object.values(cart).reduce((a, b) => a + b, 0);
      const total = Object.entries(cart).reduce((s, [id, qty]) => {
        const p = products.find(x => x.id == id);
        return s + (p ? p.price * qty : 0);
      }, 0);
      document.getElementById('cart-count').textContent = count + ' ürün';
      document.getElementById('cart-total').textContent = '₺' + total;
      document.getElementById('co-btn').disabled = count === 0;
    }

    function openOrderSheet() {
      const lines = Object.entries(cart).map(([id, qty]) => {
        const p = products.find(x => x.id == id);
        return p ? { p, qty, sub: p.price * qty } : null;
      }).filter(Boolean);
      const total = lines.reduce((s, l) => s + l.sub, 0);
      if (!lines.length) {
        document.getElementById('sheet').innerHTML = `<div class="empty-msg">Sepetinizde geçerli ürün yok.</div>`;
        document.getElementById('sheet-overlay').classList.add('open');
        return;

      document.getElementById('sheet').innerHTML = `
    <h3>Sipariş özeti</h3>
    ${lines.map(l => `<div class="oline"><span>${l.p.emoji} ${l.p.name} <span style="color:var(--text2)">×${l.qty}</span></span><span>₺${l.sub}</span></div>`).join('')}

    </div>`;
      document.getElementById('sheet-overlay').classList.add('open');
    }

    function updateDeliveryFee() {
      const region = document.getElementById('customerRegion');
      if (!region) return;
      const regionData = DELIVERY_REGIONS.find(r => r.id === region.value) || DELIVERY_REGIONS[0];
      const fee = regionData.fee || 0;
      const total = (window.currentOrderBaseTotal || 0) + fee;
      const feeEl = document.getElementById('delivery-fee');
      const totalEl = document.getElementById('delivery-total');
      if (feeEl) feeEl.textContent = fee ? `₺${fee}` : '₺0';
      if (totalEl) totalEl.textContent = `₺${total}`;
    }

          await fetch(`${API_URL}/products/${editTarget.id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"

            body: JSON.stringify(payload)
          })

        }

        closeModal()

        await loadData()

      } catch (err) {

        console.log(err)

        alert("İşlem başarısız")

      }
    }

    async function previewProductImage(event) {
      const file = event.target.files[0]
      if (!file) return

      const formData = new FormData()
      formData.append("file", file)
      formData.append("upload_preset", "market_upload")

      try {
        const res = await fetch("https://api.cloudinary.com/v1_1/dg76jseno/image/upload", {
          method: "POST",
          body: formData
        })

        const data = await res.json()

        if (!data.secure_url) {
          console.log(data)
          return alert("Cloudinary görsel yükleme hatası")
        }

        document.getElementById("f-image-url").value = data.secure_url

        const preview = document.getElementById("f-image-preview")
        const previewRow = document.getElementById("f-image-preview-row")

        if (preview) {
          preview.src = data.secure_url
          preview.style.display = "block"
        }

        if (previewRow) {
          previewRow.style.display = "block"
        }

      } catch (err) {
        console.log(err)
        alert("Görsel yüklenemedi")
      }
    }

      const imageUrlInput = document.getElementById('f-image-url');
      const fileInput = document.getElementById('f-image');
      if (preview) {
        preview.src = '';
        preview.style.display = 'none';

      if (previewRow) previewRow.style.display = 'none';
      if (imageUrlInput) imageUrlInput.value = '';
      if (fileInput) fileInput.value = '';

          method: "PUT",
          headers: {

          },
          body: JSON.stringify({
            ...s,
            active: !s.active
          })
        })

        await loadData()

    async function saveSubCat() {
      const name = document.getElementById('fs-name').value.trim()
      const catId = document.getElementById('fs-cat').value

      if (!name) {
        return alert('Alt grup adı boş olamaz')
      }

      let id

      if (editTarget.id === 'new') {
        id =
          document.getElementById('fs-id').value.trim() ||
          name
            .toLowerCase()
            .replaceAll('ğ', 'g')
            .replaceAll('ü', 'u')
            .replaceAll('ş', 's')
            .replaceAll('ı', 'i')
            .replaceAll('ö', 'o')
            .replaceAll('ç', 'c')
            .replace(/\s+/g, '-')
            .replace(/[^a-z0-9-]/g, '')
      } else {
        id = editTarget.id
      }

      const payload = {
        id,
        catId,
        name,
        active: true
      }

      try {
        if (editTarget.id === 'new') {
          await fetch(`${API_URL}/subcategories`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          })
        } else {
          await fetch(`${API_URL}/subcategories/${editTarget.id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          })
        }

        closeModal()
        await loadData()

      } catch (err) {
        console.log(err)
        alert("Alt grup kaydedilemedi")
      }
    }

        console.log(err)

      }
    }

    async function updateOrderStatus(id, status) {
      try {
        await fetch(`${API_URL}/orders/${id}/status`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status })
        })

        renderOrders()

      } catch (err) {
        console.log(err)
        alert("Sipariş durumu güncellenemedi")
      }
    }

    function showOrderSuccess(orderId, total) {
      document.getElementById('sheet').innerHTML = `
    <div style="text-align:center;padding:20px 8px">
      <div style="font-size:42px;margin-bottom:10px">✅</div>
      <h3>Siparişiniz alındı</h3>

      <p style="font-size:13px;color:var(--text2);line-height:1.6;margin:12px 0">
        Siparişiniz sisteme kaydedildi. Hazırlanmaya başlandığında durum bilgisi güncellenecektir.
      </p>

      <div style="background:var(--bg2);border-radius:12px;padding:14px;margin:14px 0;text-align:left">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:var(--text2);font-size:13px">Sipariş No</span>
          <strong>#${orderId}</strong>
        </div>

        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:var(--text2);font-size:13px">Durum</span>
          <strong style="color:var(--green)">Bekliyor</strong>
        </div>

        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--text2);font-size:13px">Toplam</span>
          <strong>₺${total}</strong>
        </div>
      </div>

      <button class="btn btn-g" style="width:100%;height:42px;justify-content:center" onclick="finishOrderSuccess()">
        Tamam
      </button>
      <p style="font-size:12px;color:var(--text2)">
  Siparişinizi “Sipariş Takip” bölümünden sipariş no ve telefon numaranızla takip edebilirsiniz.
      </p>
    </div>
  `
    }

    function finishOrderSuccess() {
      Object.keys(cart).forEach(k => delete cart[k])
      updateCartBar()
      closeSheet()
      renderOrderProducts()
    }

    async function trackOrder() {
      const orderId = document.getElementById('track-order-id').value.trim()
      const phone = normalizePhone(document.getElementById('track-phone').value.trim())
      const resultEl = document.getElementById('track-result')

      if (!orderId || !phone) {
        return alert("Sipariş no ve telefon gerekli")
      }

      try {
        const res = await fetch(`${API_URL}/track-order`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ orderId, phone })
        })

        const data = await res.json()

        if (!res.ok) {
          resultEl.innerHTML = `<div class="empty-msg">${data.message || "Sipariş bulunamadı"}</div>`
          return
        }

        const o = data.order

        resultEl.innerHTML = `
      <div style="background:var(--bg2);border-radius:12px;padding:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:var(--text2)">Sipariş No</span>
          <strong>#${o.id}</strong>
        </div>

        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:var(--text2)">Durum</span>
          <strong style="color:var(--green)">${o.status}</strong>
        </div>

        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:var(--text2)">Toplam</span>
          <strong>₺${o.total}</strong>
        </div>

        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--text2)">Tarih</span>
          <strong>${new Date(o.createdAt).toLocaleString('tr-TR')}</strong>
        </div>
      </div>
    `

      } catch (err) {
        console.log(err)
        alert("Sipariş sorgulanamadı")
      }
    }

    function normalizePhone(phone) {
      let cleaned = phone.replace(/[^0-9]/g, "")

      if (cleaned.startsWith("0")) {
        cleaned = "9" + cleaned
      }

      if (!cleaned.startsWith("90")) {
        cleaned = "90" + cleaned
      }

      return cleaned
    }

    /*customerPhone: normalizePhone(phone),*/

    async function openOrderDetail(orderId) {
      console.log("Detay açılıyor:", orderId)

      try {
        const res = await fetch(`${API_URL}/orders/${orderId}/items`)
        const items = await res.json()

        console.log("Sipariş ürünleri:", items)

        const modal = document.getElementById('modal')

        modal.innerHTML = `
      <h3>Sipariş Detayı #${orderId}</h3>

      <div style="display:flex;flex-direction:column;gap:8px">
        ${items.length
            ? items.map(item => `
              <div class="oline">
                <span>${item.productName} × ${item.quantity}</span>
                <span>₺${item.subtotal}</span>
              </div>
            `).join('')
            : `<div class="empty-msg">Ürün detayı bulunamadı.</div>`
          }
      </div>

      <div class="faction">
        <button class="btn" onclick="closeModal()">Kapat</button>
      </div>
    `

        document.getElementById('overlay').classList.add('open')

      } catch (err) {
        console.log("Detay hatası:", err)
        alert("Sipariş detayı yüklenemedi")
      }
    }

    async function renderDashboard() {
      const statsEl = document.getElementById('dashboard-stats')
      const ordersEl = document.getElementById('dashboard-orders')

      try {
        const res = await fetch(`${API_URL}/orders`)
        const orders = await res.json()

        const today = new Date().toLocaleDateString('tr-TR')

        const todayOrders = orders.filter(o => {
          return new Date(o.createdAt).toLocaleDateString('tr-TR') === today
        })

        const totalRevenue = orders.reduce((sum, o) => sum + Number(o.total || 0), 0)
        const todayRevenue = todayOrders.reduce((sum, o) => sum + Number(o.total || 0), 0)
        const waitingOrders = orders.filter(o => o.status === 'Bekliyor').length

        statsEl.innerHTML = `
      <div class="stat">
        <div class="stat-lbl">Toplam Sipariş</div>
        <div class="stat-val">${orders.length}</div>
      </div>

      <div class="stat">
        <div class="stat-lbl">Bugünkü Sipariş</div>
        <div class="stat-val">${todayOrders.length}</div>
      </div>

      <div class="stat">
        <div class="stat-lbl">Bekleyen</div>
        <div class="stat-val">${waitingOrders}</div>
      </div>

      <div class="stat">
        <div class="stat-lbl">Toplam Ciro</div>
        <div class="stat-val">₺${totalRevenue}</div>
      </div>

      <div class="stat">
        <div class="stat-lbl">Bugünkü Ciro</div>
        <div class="stat-val">₺${todayRevenue}</div>
      </div>

      <div class="stat">
        <div class="stat-lbl">Aktif Ürün</div>
        <div class="stat-val">${products.filter(p => p.active).length}</div>
      </div>
    `

        const lastOrders = orders.slice(0, 5)

        if (!lastOrders.length) {
          ordersEl.innerHTML = `<tr><td colspan="5"><div class="empty-msg">Henüz sipariş yok.</div></td></tr>`
          return
        }

        ordersEl.innerHTML = lastOrders.map(o => `
      <tr>
        <td>#${o.id}</td>
        <td>${o.customerName}</td>
        <td style="font-weight:500;color:var(--green)">₺${o.total}</td>
        <td><span class="badge b-active">${o.status}</span></td>
        <td>${new Date(o.createdAt).toLocaleString('tr-TR')}</td>
      </tr>
    `).join('')

      } catch (err) {
        console.log(err)
        statsEl.innerHTML = `<div class="empty-msg">Dashboard yüklenemedi.</div>`
      }
    }

    function playNewOrderSound() {
      const audio = document.getElementById("new-order-sound")

      if (!audio) return

      audio.currentTime = 0

      audio.play().catch(() => { })

      setTimeout(() => {
        audio.currentTime = 0
        audio.play().catch(() => { })
      }, 900)

      setTimeout(() => {
        audio.currentTime = 0
        audio.play().catch(() => { })
      }, 1800)
    }

    function showNewOrderAlert(order) {
      const box = document.createElement("div")

      box.innerHTML = `
    <div style="
      position:fixed;
      right:16px;
      bottom:80px;
      background:var(--bg);
      border:1px solid var(--border2);
      border-radius:12px;
      padding:14px;
      z-index:9999;
      box-shadow:0 10px 30px rgba(0,0,0,0.18);
      min-width:240px;
    ">
      <div style="font-weight:600;margin-bottom:4px">🔔 Yeni sipariş geldi</div>
      <div style="font-size:13px;color:var(--text2)">#${order.id} · ${order.customerName}</div>
      <div style="font-size:13px;color:var(--green);margin-top:4px">₺${order.total}</div>
    </div>
  `

      document.body.appendChild(box)

      setTimeout(() => {
        box.remove()
      }, 5000)
    }

    async function checkNewOrders() {
      try {
        const res = await fetch(`${API_URL}/orders`)
        const orders = await res.json()

        if (!orders.length) return

        const newestOrder = orders[0]

        if (lastKnownOrderId === null) {
          lastKnownOrderId = newestOrder.id
          return
        }

        if (newestOrder.id > lastKnownOrderId) {
          lastKnownOrderId = newestOrder.id

          playNewOrderSound()
          showNewOrderAlert(newestOrder)

          renderDashboard()
          renderOrders()
        }

      } catch (err) {
        console.log("Yeni sipariş kontrol hatası:", err)
      }
    }

    function startOrderWatcher() {
      if (orderCheckStarted) return

      orderCheckStarted = true

      checkNewOrders()

      setInterval(checkNewOrders, 7000)
    }

    function startSocket() {
      if (socket) return

      socket = io(API_URL, {
        transports: ["websocket", "polling"]
      })

      socket.on("connect", () => {
        console.log("Socket bağlandı:", socket.id)
      })

      socket.on("new-order", async (order) => {
        console.log("Yeni sipariş geldi:", order)

        playNewOrderSound()
        showNewOrderAlert({
          id: order.orderId,
          customerName: order.customerName,
          total: order.total
        })

        await loadData()
        renderDashboard()
        renderOrders()
      })

      socket.on("order-status-updated", async (data) => {
        console.log("Sipariş durumu güncellendi:", data)

        renderDashboard()
        renderOrders()
      })

      socket.on("disconnect", () => {
        console.log("Socket bağlantısı koptu")
      })
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => console.log("Service Worker kayıt edildi"))
          .catch(err => console.log("Service Worker hatası:", err))
      })
    }

    /* ─── BAŞLANGIÇ ─── */
    loadData()
  </script>

  <audio id="new-order-sound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" type="audio/ogg">
  </audio>
